services:
  clawdian_victim:
    build:
      context: ../..
      dockerfile: engine/victim/Dockerfile.victim
    container_name: clawdian_victim
    # Bind mounts expose the victim's mutable state to the host so the
    # collectors (file_observer, log_observer) running on the host can watch
    # them without needing privileged access into the container.
    volumes:
      - ../../victim_state:/tmp/ClawdianShield
      - ../../victim_logs:/var/log
    # Pure target: no inbound network exposure, no outbound to internet.
    network_mode: none
    # Drop capabilities the scenarios should not need. Add back per-scenario
    # in a future override file if a scenario legitimately needs them.
    cap_drop:
      - ALL
    read_only: false
    restart: "no"

  ClawdianShield-runner:
    build:
      context: ../..
      dockerfile: engine/docker/Dockerfile.runner
    container_name: ClawdianShield-runner
    depends_on:
      - clawdian_victim
    volumes:
      - ../scenarios:/app/engine/scenarios:ro
      - ../../reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      # Inside Docker, Splunk is reachable via its service name.
      # Host-side collectors use http://localhost:8088 instead.
      - SPLUNK_HEC_URL=http://splunk:8088
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
    networks:
      - clawdian_net
    # Default: dry-run the storyline. Override via:
    #   docker compose run --rm ClawdianShield-runner \
    #     python engine/executor.py engine/scenarios/<id>.json --container clawdian_victim
    command:
      [
        "python",
        "engine/executor.py",
        "engine/scenarios/full_storyline.json",
        "--dry-run",
      ]

  splunk:
    image: splunk/splunk:latest
    container_name: clawdian_splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      # Must be set in .env — min 8 chars, at least one uppercase + number.
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      # Auto-provisions this token and enables the HEC input on startup.
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      # Disable TLS on the HEC port so http:// URLs work without cert pinning.
      - SPLUNK_HEC_SSL=false
    ports:
      - "8000:8000"   # Splunk Web UI
      - "8088:8088"   # HTTP Event Collector ingest
    volumes:
      # Both mounts are required to persist the HEC token across restarts.
      # Without them, Splunk regenerates its config on every container start,
      # invalidating the token stored in .env.
      - splunk_var:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
    networks:
      - clawdian_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Splunk takes 60-120s to initialise on first boot; give it room.
      start_period: 90s
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: clawdian_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Disable TLS for local dev
      - xpack.security.http.ssl.enabled=false
      # Required so Metricbeat's elasticsearch-xpack module can pull
      # cluster, node, and index stats for Stack Monitoring.
      - xpack.monitoring.collection.enabled=true
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - clawdian_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: "no"

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.11.0
    container_name: clawdian_metricbeat
    user: root
    # Strict file ownership check on the mounted config; relax for bind mount.
    command: ["--strict.perms=false", "-environment", "container"]
    volumes:
      - ./metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - ./metricbeat-modules.d:/usr/share/metricbeat/modules.d:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - clawdian_net
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: clawdian_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - clawdian_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: "no"

networks:
  clawdian_net:
    driver: bridge

volumes:
  splunk_var:
  splunk_etc:
  elasticsearch_data:
